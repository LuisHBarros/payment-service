<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Service — Diagramas de Fluxo</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c1220;
            --card: #151d30;
            --card2: #1a2440;
            --border: #1e2a45;
            --fg: #e2e8f0;
            --fg2: #cbd5e1;
            --muted: #64748b;
            --accent: #00d4aa;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #06b6d4;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --card2: #f1f5f9;
            --border: #e2e8f0;
            --fg: #0f172a;
            --fg2: #334155;
            --muted: #64748b;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(1200px 800px at 80% 10%, rgba(0, 212, 170, 0.08), transparent),
                        radial-gradient(800px 600px at 10% 90%, rgba(6, 182, 212, 0.06), transparent);
            pointer-events: none;
            z-index: 0;
        }

        header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px 20px;
        }
        header h1 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--fg) 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        header p { color: var(--muted); font-size: 0.95rem; margin-top: 6px; }

        nav.tabs {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        nav.tabs button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--fg2);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        nav.tabs button:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        nav.tabs button[class*="active-transfer"] { background: rgba(0, 212, 170, 0.1); border-color: #00d4aa; color: #00d4aa; box-shadow: 0 4px 20px rgba(0, 212, 170, 0.15); }
        nav.tabs button[class*="active-deposit"] { background: rgba(245, 158, 11, 0.1); border-color: #f59e0b; color: #f59e0b; box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15); }
        nav.tabs button[class*="active-auth"] { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; color: #ef4444; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.15); }
        nav.tabs button[class*="active-arch"] { background: rgba(6, 182, 212, 0.1); border-color: #06b6d4; color: #06b6d4; box-shadow: 0 4px 20px rgba(6, 182, 212, 0.15); }

        main { position: relative; z-index: 1; padding: 0 8px 60px; }
        .panel { display: none; animation: fadeUp 0.35s ease; }
        .panel.active { display: block; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .panel-header h2 { font-size: 1.2rem; font-weight: 600; }
        .legend { display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--muted); }
        .legend-sw { width: 16px; height: 10px; border-radius: 2px; border: 2px solid; flex-shrink: 0; }
        .legend-sw.filled { border: none; }
        .diagram-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: auto;
            max-height: 88vh;
        }
        .diagram-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .diagram-wrap::-webkit-scrollbar-track { background: transparent; }
        .diagram-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .diagram-wrap svg { display: block; width: 100%; min-width: 680px; height: auto; }
        .step { cursor: default; }
        .step rect { transition: filter 0.2s ease; }
        .step:hover rect { filter: brightness(1.25); }
        .step.highlighted rect {
            filter: brightness(1.4);
            stroke-width: 3;
        }
    </style>
</head>
<body>
    <header>
        <h1>Payment Service</h1>
        <p>Diagramas de fluxo da aplicação de pagamentos</p>
    </header>

    <nav class="tabs" role="tablist">
        <button class="active-transfer" data-tab="transfer" role="tab" aria-selected="true"><i class="fas fa-exchange-alt"></i>Transferência</button>
        <button data-tab="deposit" role="tab" aria-selected="false"><i class="fas fa-plus-circle"></i>Depósito</button>
    </nav>

    <main>
        <!-- ==================== DEPOSIT (FIXED) ==================== -->
        <section id="deposit" class="panel" role="tabpanel">
            <div class="panel-header">
                <h2>Fluxo de Depósito via Stripe</h2>
                <div class="legend">
                    <div class="legend-item"><div class="legend-sw filled" style="background:#f59e0b"></div>Endpoint</div>
                    <div class="legend-item"><div class="legend-sw" style="border-color:#f59e0b"></div>Serviço</div>
                    <div class="legend-item"><div class="legend-sw" style="border-color:#94a3b8;border-style:dashed;background:rgba(148,163,184,0.08)"></div>Externo</div>
                    <div class="legend-item"><div class="legend-sw" style="border-color:#6366f1;border-style:dashed;background:rgba(99,102,241,0.08)"></div>Frontend (implementar)</div>
                </div>
            </div>
            <div class="diagram-wrap">
                <svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern id="dg2" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r=".5" fill="rgba(255,255,255,0.035)"/></pattern>
                        <marker id="ad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1L9,5L0,9z" fill="#f59e0b"/></marker>
                        <marker id="ae" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1L9,5L0,9z" fill="#94a3b8"/></marker>
                        <marker id="af" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1L9,5L0,9z" fill="#6366f1"/></marker>
                        <filter id="gd"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f59e0b" flood-opacity="0.35"/></filter>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#dg2)"/>

                    <!-- LEFT COLUMN: FRONTEND ZONE -->
                    <rect x="20" y="40" width="260" height="780" rx="12" fill="rgba(99,102,241,0.04)" stroke="rgba(99,102,241,0.2)" stroke-width="1.5" stroke-dasharray="6,4"/>
                    <text x="150" y="30" font-family="Space Grotesk,sans-serif" fill="#6366f1" font-size="12" font-weight="600" text-anchor="middle">FRONTEND — IMPLEMENTAR</text>
                    <text x="150" y="815" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9" text-anchor="middle">⚠️ Não incluso neste projeto</text>

                    <!-- F1: DepositForm -->
                    <g class="step"><rect x="40" y="60" width="220" height="55" rx="8" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
                        <text x="150" y="87" font-family="JetBrains Mono,monospace" fill="#818cf8" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="central">DepositForm</text>
                        <text x="150" y="105" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9" text-anchor="middle" dominant-baseline="central">Component React/Vue</text>
                    </g>
                    <circle cx="35" cy="87" r="12" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.2"/>
                    <text x="35" y="87" font-family="JetBrains Mono,monospace" fill="#6366f1" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">F1</text>

                    <!-- F2: StripeProvider -->
                    <g class="step"><rect x="40" y="180" width="220" height="55" rx="8" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
                        <text x="150" y="207" font-family="JetBrains Mono,monospace" fill="#818cf8" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="central">StripeProvider</text>
                        <text x="150" y="225" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9" text-anchor="middle" dominant-baseline="central">Elements wrapper</text>
                    </g>
                    <circle cx="35" cy="207" r="12" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.2"/>
                    <text x="35" y="207" font-family="JetBrains Mono,monospace" fill="#6366f1" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">F2</text>

                    <!-- F3: PaymentStatus -->
                    <g class="step"><rect x="40" y="600" width="220" height="55" rx="8" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
                        <text x="150" y="627" font-family="JetBrains Mono,monospace" fill="#818cf8" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="central">PaymentStatus</text>
                        <text x="150" y="645" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9" text-anchor="middle" dominant-baseline="central">Polling / WebSocket</text>
                    </g>
                    <circle cx="35" cy="627" r="12" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.2"/>
                    <text x="35" y="627" font-family="JetBrains Mono,monospace" fill="#6366f1" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">F3</text>

                    <!-- F4: DepositFeedback -->
                    <g class="step"><rect x="40" y="720" width="220" height="55" rx="8" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
                        <text x="150" y="747" font-family="JetBrains Mono,monospace" fill="#818cf8" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="central">DepositFeedback</text>
                        <text x="150" y="765" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9" text-anchor="middle" dominant-baseline="central">Success / Error UI</text>
                    </g>
                    <circle cx="35" cy="747" r="12" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1.2"/>
                    <text x="35" y="747" font-family="JetBrains Mono,monospace" fill="#6366f1" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">F4</text>

                    <!-- RIGHT COLUMN: EXTERNAL ZONE -->
                    <rect x="920" y="180" width="260" height="280" rx="12" fill="rgba(148,163,184,0.03)" stroke="rgba(148,163,184,0.15)" stroke-width="1.5" stroke-dasharray="5,4"/>
                    <text x="1050" y="170" font-family="Space Grotesk,sans-serif" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">ZONA EXTERNA</text>

                    <!-- Step 3: Stripe API -->
                    <g class="step"><rect x="940" y="200" width="220" height="60" rx="8" fill="rgba(148,163,184,0.08)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
                        <text x="1050" y="227" font-family="JetBrains Mono,monospace" fill="#94a3b8" font-size="12" font-weight="600" text-anchor="middle" dominant-baseline="central">Stripe API</text>
                        <text x="1050" y="247" font-family="JetBrains Mono,monospace" fill="#64748b" font-size="10" text-anchor="middle" dominant-baseline="central">PaymentIntent.create()</text>
                    </g>
                    <circle cx="935" cy="230" r="12" fill="rgba(148,163,184,0.15)" stroke="#94a3b8" stroke-width="1.2"/>
                    <text x="935" y="230" font-family="JetBrains Mono,monospace" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">3</text>

                    <!-- Step 5: Stripe Elements -->
                    <g class="step"><rect x="940" y="360" width="220" height="60" rx="8" fill="rgba(148,163,184,0.08)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>
                        <text x="1050" y="387" font-family="JetBrains Mono,monospace" fill="#94a3b8" font-size="12" font-weight="600" text-anchor="middle" dominant-baseline="central">Stripe Elements</text>
                        <text x="1050" y="407" font-family="JetBrains Mono,monospace" fill="#64748b" font-size="10" text-anchor="middle" dominant-baseline="central">Usuário paga</text>
                    </g>
                    <circle cx="935" cy="390" r="12" fill="rgba(148,163,184,0.15)" stroke="#94a3b8" stroke-width="1.2"/>
                    <text x="935" y="390" font-family="JetBrains Mono,monospace" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">5</text>

                    <!-- CENTER: BACKEND FLOW -->
                    <text x="600" y="30" font-family="Space Grotesk,sans-serif" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle">BACKEND — Este Projeto</text>

                    <!-- Step 1: POST /wallets/{id}/deposits -->
                    <g class="step"><rect x="450" y="60" width="300" height="55" rx="8" fill="#f59e0b" filter="url(#gd)"/>
                        <text x="600" y="92" font-family="JetBrains Mono,monospace" fill="#0c1220" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="central">POST /wallets/{id}/deposits</text>
                    </g>
                    <circle cx="435" cy="87" r="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.2"/>
                    <text x="435" y="87" font-family="JetBrains Mono,monospace" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">1</text>

                    <!-- Step 2: CreateDepositService -->
                    <g class="step"><rect x="450" y="180" width="300" height="55" rx="8" fill="#151d30" stroke="#f59e0b" stroke-width="2"/>
                        <text x="600" y="212" font-family="JetBrains Mono,monospace" fill="#e2e8f0" font-size="13" font-weight="500" text-anchor="middle" dominant-baseline="central">CreateDepositService</text>
                    </g>
                    <circle cx="435" cy="207" r="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.2"/>
                    <text x="435" y="207" font-family="JetBrains Mono,monospace" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">2</text>

                    <!-- Step 4: Return clientSecret -->
                    <g class="step"><rect x="450" y="340" width="300" height="55" rx="8" fill="#f59e0b" filter="url(#gd)"/>
                        <text x="600" y="372" font-family="JetBrains Mono,monospace" fill="#0c1220" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="central">{ clientSecret }</text>
                    </g>
                    <circle cx="435" cy="367" r="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.2"/>
                    <text x="435" y="367" font-family="JetBrains Mono,monospace" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">4</text>

                    <!-- Step 6: Webhook -->
                    <g class="step"><rect x="450" y="500" width="300" height="55" rx="8" fill="#f59e0b" filter="url(#gd)"/>
                        <text x="600" y="532" font-family="JetBrains Mono,monospace" fill="#0c1220" font-size="13" font-weight="600" text-anchor="middle" dominant-baseline="central">POST /webhooks/deposits</text>
                    </g>
                    <circle cx="435" cy="527" r="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.2"/>
                    <text x="435" y="527" font-family="JetBrains Mono,monospace" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">6</text>

                    <!-- Step 7: ProcessDepositService -->
                    <g class="step"><rect x="450" y="600" width="300" height="55" rx="8" fill="#151d30" stroke="#f59e0b" stroke-width="2"/>
                        <text x="600" y="632" font-family="JetBrains Mono,monospace" fill="#e2e8f0" font-size="13" font-weight="500" text-anchor="middle" dominant-baseline="central">ProcessDepositService</text>
                    </g>
                    <circle cx="435" cy="627" r="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.2"/>
                    <text x="435" y="627" font-family="JetBrains Mono,monospace" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">7</text>

                    <!-- Step 8: Kafka -->
                    <g class="step"><rect x="470" y="700" width="260" height="50" rx="8" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
                        <text x="600" y="722" font-family="JetBrains Mono,monospace" fill="#f59e0b" font-size="12" font-weight="600" text-anchor="middle" dominant-baseline="central">KAFKA</text>
                        <text x="600" y="740" font-family="JetBrains Mono,monospace" fill="#cbd5e1" font-size="10" text-anchor="middle" dominant-baseline="central">payment.deposit.processed</text>
                    </g>
                    <circle cx="455" cy="725" r="12" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1.2"/>
                    <text x="455" y="725" font-family="JetBrains Mono,monospace" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle" dominant-baseline="central">8</text>

                    <!-- Final -->
                    <g class="step"><rect x="500" y="785" width="200" height="45" rx="8" fill="#f59e0b" filter="url(#gd)"/>
                        <text x="600" y="810" font-family="JetBrains Mono,monospace" fill="#0c1220" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central">DEPOSIT_COMPLETED</text>
                    </g>

                    <!-- FLOW ARROWS -->
                    <!-- F1 → Step 1 -->
                    <line x1="260" y1="87" x2="450" y2="87" stroke="#6366f1" stroke-width="2" marker-end="url(#af)"/>
                    <text x="355" y="80" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">chama API</text>

                    <!-- Step 1 → Step 2 -->
                    <line x1="600" y1="115" x2="600" y2="180" stroke="#f59e0b" stroke-width="2" marker-end="url(#ad)"/>

                    <!-- Step 2 → Step 3 (Stripe) -->
                    <line x1="750" y1="207" x2="940" y2="230" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ae)"/>
                    <text x="845" y="215" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">cria PaymentIntent</text>

                    <!-- Step 3 → Step 4 (return clientSecret) -->
                    <path d="M940,250 Q 800,310 750,367" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ae)"/>
                    <text x="870" y="300" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">retorna clientSecret</text>

                    <!-- Step 4 → F2 (send to frontend) -->
                    <path d="M450,367 Q 350,290 260,235" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#af)"/>
                    <text x="350" y="320" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">envia para frontend</text>

                    <!-- F2 → Step 5 (Stripe Elements) -->
                    <path d="M260,207 Q 600,207 940,390" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#af)"/>
                    <text x="600" y="200" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">mount Elements + confirmPayment</text>

                    <!-- Step 5 → Step 6 (webhook) -->
                    <path d="M940,420 Q 800,470 750,527" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ae)"/>
                    <text x="870" y="460" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">webhook event</text>

                    <!-- Step 6 → Step 7 -->
                    <line x1="600" y1="555" x2="600" y2="600" stroke="#f59e0b" stroke-width="2" marker-end="url(#ad)"/>

                    <!-- Step 7 annotation -->
                    <rect x="760" y="600" width="320" height="55" rx="6" fill="#1a2440" stroke="#1e2a45" stroke-width="1"/>
                    <text x="775" y="620" font-family="Space Grotesk,sans-serif" fill="#94a3b8" font-size="10">wallet.setBalance(amount)</text>
                    <text x="775" y="635" font-family="Space Grotesk,sans-serif" fill="#94a3b8" font-size="10">+ OutboxEntity(DEPOSIT_PROCESSED)</text>
                    <text x="775" y="650" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">Stripe signature verification</text>
                    <line x1="750" y1="627" x2="760" y2="627" stroke="#1e2a45" stroke-width="1" stroke-dasharray="3,3"/>

                    <!-- Step 7 → Step 8 -->
                    <line x1="600" y1="655" x2="600" y2="700" stroke="#f59e0b" stroke-width="2" marker-end="url(#ad)"/>

                    <!-- Step 8 → Final -->
                    <line x1="600" y1="750" x2="600" y2="785" stroke="#f59e0b" stroke-width="2" marker-end="url(#ad)"/>

                    <!-- Step 7 → F3 (status update) -->
                    <path d="M450,627 Q 300,627 260,627" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#af)"/>
                    <text x="355" y="615" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">atualiza status</text>

                    <!-- F3 → F4 -->
                    <line x1="150" y1="655" x2="150" y2="720" stroke="#6366f1" stroke-width="2" marker-end="url(#af)"/>
                    <text x="155" y="690" font-family="Space Grotesk,sans-serif" fill="#64748b" font-size="9">mostra resultado</text>

        </section>
    </main>

    <script>
        // Simple tab switching
        const tabs = document.querySelectorAll('nav.tabs button');
        const panels = document.querySelectorAll('.panel');

        const colorMap = {
            transfer: 'active-transfer',
            deposit: 'active-deposit'
        };

        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                tabs.forEach(t => t.className = '');
                btn.classList.add(colorMap[target] || '');
                panels.forEach(p => p.classList.remove('active'));
                document.getElementById(target).classList.add('active');
            });
        });
    </script>
</body>
</html>
