spring:
  application:
    name: payment-service
  crypto:
    secret: ${APP_CRYPTO_SECRET}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.payment.payment_service.shared.event, com.payment.payment_service.transfer.event
      listener:
        retry-backoff-ms: ${KAFKA_RETRY_BACKOFF_MS:1000}
        max-attempts: ${KAFKA_MAX_ATTEMPTS:3}

kafka:
  topics:
    users: payment.users
    wallet-debits: payment.wallet.debits
    wallet-credits: payment.wallet.credits
    transfer-created: payment.transfer.created
    transfer-status: payment.transfer.status
    deposit-completed: payment.deposit.completed


outbox:
  poll-interval: 500
  kafka-ack-timeout-ms: 5000
  max-attempts: 10
  cleanup:
    retention-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, info
  endpoint:
    health:
      show-details: when-authorized   # não expõe detalhes pra usuário não autenticado
  metrics:
    tags:
      application: payment-service    # tag global em todas as métricas
  tracing:
    sampling:
      probability: 1.0                # amostragem de 100% dos traces em desenvolvimento
    propagation:
      type: w3c,b3                    # suporta W3C Trace Context e B3
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}

payment:
  provider: ${PAYMENT_PROVIDER:STRIPE}
  webhook-secret: ${PAYMENT_WEBHOOK_SECRET}
  webhook-header-name: ${PAYMENT_WEBHOOK_HEADER_NAME:Stripe-Signature}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
    - ${CORS_ALLOWED_ORIGIN_2:http://localhost:3333}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  endpoints:
    POST:/api/v1/auth/login:
      capacity: 5
      refill-tokens: 5
      period-milliseconds: 60000
    POST:/api/v1/users:
      capacity: 3
      refill-tokens: 3
      period-milliseconds: 60000
    POST:/api/v1/transfers:
      capacity: 10
      refill-tokens: 10
      period-milliseconds: 60000
    PATCH:/api/v1/users/{id}:
      capacity: 5
      refill-tokens: 5
      period-milliseconds: 60000
    DELETE:/api/v1/users/{id}:
      capacity: 3
      refill-tokens: 3
      period-milliseconds: 60000
    GET:/api/v1/users:
      capacity: 30
      refill-tokens: 30
      period-milliseconds: 60000
    GET:/api/v1/users/{id}:
      capacity: 30
      refill-tokens: 30
      period-milliseconds: 60000
    GET:/api/v1/wallets/{id}:
      capacity: 30
      refill-tokens: 30
      period-milliseconds: 60000
    GET:/api/v1/transfers:
      capacity: 30
      refill-tokens: 30
      period-milliseconds: 60000
    POST:/api/v1/webhooks/deposits:
      capacity: 1000
      refill-tokens: 1000
      period-milliseconds: 60000

resilience4j:
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - com.payment.payment_service.wallet.exception.PaymentProviderException
        ignoreExceptions:
          - com.payment.payment_service.wallet.exception.WebhookSignatureException
          - com.payment.payment_service.wallet.exception.InvalidPaymentProviderException
    instances:
      paymentProvider:
        baseConfig: default
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
    instances:
      paymentProvider:
        baseConfig: default
